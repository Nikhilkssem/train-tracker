<!DOCTYPE html>
<html>
<head>
    <title>Train Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .card {
            margin-top: 100px;
            padding: 30px;
            border-radius: 15px;
            background: white;
            color: black;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
        }

        .btn-custom {
            background: #ff6a00;
            border: none;
        }

        .btn-custom:hover {
            background: #ff8c42;
        }

        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<div class="logo">🚆 Where Is My Train</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card text-center">

                <h4 class="mb-3">Track Your Train</h4>

                <form method="post">
                    {% csrf_token %}

                    <input 
                        type="text" 
                        class="form-control mb-3" 
                        name="train_no" 
                        placeholder="Enter Train Number"
                        required
                    >

                    <button class="btn btn-custom w-100">
                        🔍 Search Train
                    </button>
                </form>

            </div>

        </div>
    </div>
</div>

</body>
</html>
